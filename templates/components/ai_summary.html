<div id="ai-summary" class="bento-card large">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">

        <div class="flex items-center gap-3">

            <i data-lucide="sparkles" class="card-icon"></i>

            <div>

                <h2 class="card-title">
                    AI Race Analysis
                </h2>

                <p class="text-sm text-gray-400">
                    Generated by V6 Turbo AI
                </p>

            </div>

        </div>

        {% if summary %}
        <span class="px-3 py-1 rounded-full bg-red-500/15 text-red-400 text-xs font-semibold">
            Generated
        </span>
        {% endif %}

    </div>


    {% if summary %}
     
    <div class="analysis-box">
        <div class="flex flex-wrap items-center gap-3 mb-6">

    <span class="px-3 py-1 rounded-full bg-red-500/10 text-red-400 text-xs font-semibold border border-red-500/20">
        V6 Turbo AI
    </span>

    <span class="px-3 py-1 rounded-full bg-gray-800 text-gray-300 text-xs border border-gray-700">
        Gemini 2.5 Flash
    </span>

    <span class="px-3 py-1 rounded-full bg-gray-800 text-gray-300 text-xs border border-gray-700">
        FIA Race Control
    </span>

</div>
         
        {{ summary }}

    </div>

    {% else %}

    <div class="analysis-placeholder">

        <i data-lucide="bot" class="w-12 h-12 text-red-500 mb-4"></i>

        <h3 class="text-xl font-semibold mb-2">
            No AI Analysis Yet
        </h3>

        <p class="card-subtitle max-w-md mx-auto">

            Click <strong>Generate Analysis</strong> button to let
            V6 Turbo AI analyze the latest Formula 1 race.

        </p>

    </div>

    {% endif %}

</div>
