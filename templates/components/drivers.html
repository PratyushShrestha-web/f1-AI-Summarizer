<div class="bento-card medium flex flex-col justify-between">

    <div class="flex items-center justify-between mb-6">
<i data-lucide="users" class="card-icon"></i>
        <h2 class="card-title">
             Drivers
        </h2>

        <a href="/standings"
           class="text-red-500 text-sm hover:underline">
            View All →
        </a>

    </div>
    <h3 class="card-subtitle">Latest race participants<h3>
    {% for driver in drivers[:3] %}

    <div class="flex items-center justify-between py-3 border-b border-gray-700 last:border-0">

        <div>

            <p class="font-semibold">
                {{ driver.full_name }}
            </p>

            <p class="text-sm text-gray-400">
                {{ driver.team_name }}
            </p>

        </div>

        <div class="text-right">

            <span class="inline-flex items-center justify-center
                         w-10 h-10 rounded-full
                         bg-red-600 font-bold">

                {{ driver.driver_number }}

            </span>

        </div>

    </div>

    {% endfor %}

</div>
