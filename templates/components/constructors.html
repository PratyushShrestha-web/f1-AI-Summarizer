<div class="bento-card medium flex flex-col justify-between">

    <div class="flex items-center justify-between mb-6">

        <div>

            <div class="flex items-center gap-3">

                <i data-lucide="factory" class="w-6 h-6 text-red-500"></i>

                <h2 class="card-title">
                    Constructors
                </h2>

            </div>

            <p class="card-subtitle">
                Current team standings
            </p>

        </div>

        <a href="/standings"
           class="text-red-500 text-sm hover:underline">
            View →
        </a>

    </div>

    {% for team in constructors[:3] %}

    <div class="flex items-center justify-between py-3 border-b border-gray-700 last:border-0">

        <div>

            <p class="font-semibold">
                {{ team.team_name }}
            </p>

            <p class="text-sm text-gray-400">
                
                Position {{ team.position_current }}
            </p>

        </div>

        <div class="text-right">

            <p class="font-bold text-red-500">
                {{ team.points_current | int }}
            </p>

            <p class="text-xs text-gray-500">
                pts
            </p>

        </div>

    </div>

    {% endfor %}

</div>
