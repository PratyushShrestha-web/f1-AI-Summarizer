<div class="bento-card medium flex flex-col justify-between">

    <div class="flex items-center justify-between mb-6">
           <i data-lucide="trophy" class="card-icon"></i>
        <h2 class="card-title">
             Championship
        </h2>

        <a href="/standings"
           class="text-red-500 text-sm hover:underline">
            View All →
        </a>

    </div>
       <h3 class="card-subtitle">Current Formula 1 standings<h3>
    {% for driver in championship[:3] %}

    <div class="flex items-center justify-between py-3 border-b border-gray-700 last:border-0">

        <div class="flex items-center gap-4">

            <div class="text-2xl">

                {% if driver.position == 1 %}
                    🥇
                {% elif driver.position == 2 %}
                    🥈
                {% elif driver.position == 3 %}
                    🥉
                {% endif %}

            </div>

            <div>

                <p class="font-semibold">
                    {{ driver.name }}
                </p>

                <p class="text-sm text-gray-400">
                    {{ driver.team }}
                </p>

            </div>

        </div>

        <div class="text-right">

            <p class="font-bold text-red-500">
                {{ driver.points|int }}
            </p>

            <p class="text-xs text-gray-500">
                pts
            </p>

        </div>

    </div>

    {% endfor %}

</div>
