<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Circuits | V6 Turbo AI</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    >

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

</head>


<body class="bg-black text-white">

    {% include "components/navbar.html" %}

    <main class="max-w-7xl mx-auto px-8 py-12">

        <!-- PAGE HEADER -->

        <div class="mb-10">

            <div class="flex items-center gap-3 mb-3">

                <i
                    data-lucide="map"
                    class="w-8 h-8 text-red-500"
                ></i>

                <h1 class="text-4xl font-bold">
                    Formula 1 Circuits
                </h1>

            </div>

            <p class="text-gray-400">

                Explore
                <span class="text-white font-semibold">
                    {{ circuits|length }}
                </span>

                Formula 1 circuits from around the world.

            </p>

        </div>


        <!-- SEARCH -->

        <div class="flex flex-col md:flex-row gap-4 mb-6">

            <div class="relative flex-1">

                <i
                    data-lucide="search"
                    class="absolute left-4 top-1/2
                           -translate-y-1/2
                           text-gray-500
                           w-5 h-5"
                ></i>

                <input
                    id="circuit-search"
                    type="text"
                    placeholder="Search circuits or countries..."
                    class="w-full bg-[#171717]
                           border border-gray-800
                           rounded-xl
                           py-3
                           pl-12
                           pr-4
                           text-white
                           outline-none
                           focus:border-red-600
                           transition"
                >

            </div>

        </div>


        <!-- MAP -->

        <div
            id="circuits-map"
            class="w-full h-[600px]
                   rounded-2xl
                   overflow-hidden
                   border border-gray-800"
        ></div>


        <!-- CIRCUIT LIST -->

        <div class="mt-12">

            <h2 class="text-2xl font-bold mb-6">
                Circuit Locations
            </h2>


            <div
                id="circuit-list"
                class="grid grid-cols-1
                       md:grid-cols-2
                       lg:grid-cols-3
                       gap-5"
            >

                {% for circuit, info in circuits.items() %}

                <div
                    class="circuit-card
                           bg-[#171717]
                           border border-gray-800
                           rounded-xl
                           p-5
                           hover:border-red-600
                           transition
                           cursor-pointer"

                    data-circuit="{{ circuit }}"
                    data-country="{{ info.country }}"
                    data-lat="{{ info.coordinates[0] }}"
                    data-lng="{{ info.coordinates[1] }}"
                >

                    <div class="flex items-start justify-between">

                        <div>

                            <h3 class="font-bold text-lg">
                                {{ circuit }}
                            </h3>

                            <p class="text-gray-400 text-sm mt-1">
                                {{ info.country }}
                            </p>

                        </div>


                        <i
                            data-lucide="map-pin"
                            class="text-red-500 w-5 h-5"
                        ></i>

                    </div>

                </div>

                {% endfor %}

            </div>

        </div>

    </main>

</body>


    </main>


    <script>

        const circuits =
            {{ circuits | tojson }};


        const map = L.map("circuits-map")
            .setView([20, 0], 2);


        L.tileLayer(
            "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
            {
                attribution: "&copy; OpenStreetMap &copy; CARTO"
            }
        ).addTo(map);


        const bounds = [];


        const raceIcon = L.icon({

            iconUrl:
                "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",

            shadowUrl:
                "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",

            iconSize: [25, 41],

            iconAnchor: [12, 41],

            popupAnchor: [1, -34]

        });


        for (const circuit in circuits) {


            const info = circuits[circuit];


            const marker = L.marker(
                info.coordinates,
                {
                    icon: raceIcon
                }
            ).addTo(map);


            marker.bindPopup(`

                <div style="min-width:180px; text-align:center;">

                    <h3 style="
                        font-size:17px;
                        font-weight:bold;
                        margin-bottom:6px;
                    ">

                        ${circuit}

                    </h3>


                    <p style="
                        color:#666;
                        margin-bottom:10px;
                    ">

                        ${info.country}

                    </p>


                    <div style="
                        color:#E10600;
                        font-weight:bold;
                    ">

                        FORMULA 1 CIRCUIT

                    </div>

                </div>

            `);


            bounds.push(info.coordinates);


            // Connect circuit card to marker

            const cards =
                document.querySelectorAll(".circuit-card");


            cards.forEach(card => {


                const lat =
                    parseFloat(card.dataset.lat);


                const lng =
                    parseFloat(card.dataset.lng);


                if (

                    lat === info.coordinates[0] &&

                    lng === info.coordinates[1]

                ) {


                    card.addEventListener(
                        "click",
                        () => {

                            map.setView(
                                info.coordinates,
                                7,
                                {
                                    animate: true
                                }
                            );


                            marker.openPopup();

                        }
                    );

                }

            });

        }


        if (bounds.length > 0) {

            map.fitBounds(
                bounds,
                {
                    padding: [40, 40]
                }
            );

        }


        lucide.createIcons();

    </script>

<script>

const searchInput =
    document.getElementById("circuit-search");


const circuitCards =
    document.querySelectorAll(".circuit-card");


searchInput.addEventListener("input", function () {

    const query =
        this.value.toLowerCase().trim();


    circuitCards.forEach(card => {

        const circuit =
            card.dataset.circuit.toLowerCase();


        const country =
            card.dataset.country.toLowerCase();


        const matches =
            circuit.includes(query) ||
            country.includes(query);


        card.style.display =
            matches ? "block" : "none";

    });

});

</script>
</body>

</html>
